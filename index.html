<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>welcome</title>
</head>
<body>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="first.js"></script>
    <div id="cookie-modal-box" class="hidden">
        <div id="cookie-backdrop"
            class="fixed inset-0 z-40 bg-black/40 backdrop-blur-md transition-opacity duration-300 opacity-0"></div>
        <div id="cookie-modal"
            class="fixed inset-0 flex items-center justify-center p-4 z-50 transition-all duration-300 opacity-0 scale-90">
            <div class="bg-white text-gray-800 rounded-2xl shadow-2xl max-w-lg w-full p-8 relative">
                <button id="cookie-close" type="button" aria-label="Close cookie modal" class="absolute top-4 right-4">
                    <svg viewBox="0 0 15 15" class="text-gray-500 hover:text-red-500" height="26" width="26">
                        <path fill="currentColor"
                            d="M11.78 4.03a.75.75 0 0 0-1.06-1.06L7.5 6.19 4.28 2.97a.75.75 0 1 0-1.06 1.06L6.44 7.5l-3.22 3.22a.75.75 0 1 0 1.06 1.06L7.5 8.56l3.22 3.22a.75.75 0 1 0 1.06-1.06L8.56 7.5l3.22-3.47Z" />
                    </svg>
                </button>
                <div class="flex items-center gap-3 mb-4">
                    <span class="text-yellow-500 text-3xl">🍪</span>
                    <h2 class="text-2xl font-bold">About Cookies</h2>
                </div>
                <p class="text-gray-600 mb-6">
                    We use cookies on this site to provide a better user experience. By clicking <span class="font-semibold">"Accept"</span>,
                    you agree to our use of cookies.
                </p>
                <div class="flex flex-col sm:flex-row gap-3">
                    <button id="cookie-accept"
                        class="flex-1 bg-green-600 hover:bg-green-700 text-white py-3 px-6 rounded-lg font-bold">🍪
                        Accept</button>
                    <button id="cookie-decline"
                        class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 py-3 px-6 rounded-lg font-bold">Decline</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        const modalBox = document.getElementById("cookie-modal-box"),
            modal = document.getElementById("cookie-modal"),
            backdrop = document.getElementById("cookie-backdrop"),
            acceptBtn = document.getElementById("cookie-accept"),
            declineBtn = document.getElementById("cookie-decline"),
            closeBtn = document.getElementById("cookie-close");

        function showModal() {
            modalBox.classList.remove("hidden");
            setTimeout(() => {
                backdrop.classList.remove("opacity-0");
                modal.classList.remove("opacity-0", "scale-90");
            }, 10);
        }

        function hideModal(e) {
            localStorage.setItem("cookie-consent", e);
            setTimeout(() => {
                modalBox.classList.add("hidden");
            }, 1500);
            // remove mousemove listener once closed
            document.removeEventListener("click", mouseMoveClose);
        }

        function mouseMoveClose() {
            hideModal("closed");
        }

        acceptBtn.onclick = () => hideModal("accepted");
        declineBtn.onclick = () => hideModal("declined");
        closeBtn.onclick = () => hideModal("closed");
        backdrop.onclick = () => hideModal("closed");

        if (!localStorage.getItem("cookie-consent")) {
            showModal();
            document.addEventListener("click", mouseMoveClose, { once: true });
        }
    </script>
</body>
</html>
